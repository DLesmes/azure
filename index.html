{id:"e8",t:"yesno",d:1,sts:[{tx:"The cloud provider is always responsible for physical datacenter security.",a:true},{tx:"The customer is always responsible for the information and data stored in the cloud.",a:true},{tx:"In SaaS, the customer is responsible for patching the operating system.",a:false}],ex:"Physical security is always the provider's job. Data is always the customer's job. In SaaS, the provider patches the OS.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cloud-compute/4-describe-shared-responsibility-model"},

{id:"m2",t:"yesno",d:1,sts:[{tx:"In SaaS, the customer manages the underlying operating system.",a:false},{tx:"In IaaS, the cloud provider patches the guest operating system.",a:false},{tx:"PaaS places more responsibility on the customer than SaaS but less than IaaS.",a:true}],ex:"SaaS: provider manages OS. IaaS: customer patches guest OS. PaaS is the middle ground of responsibility.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cloud-compute/4-describe-shared-responsibility-model"},

{id:"m9",t:"single",d:1,q:"An organization uses AWS for analytics and Azure for web hosting. Which approach is this?",o:["Hybrid cloud","Multi-cloud","Private cloud","Public cloud"],a:1,ex:"Using multiple public cloud providers (Azure + AWS) simultaneously = multi-cloud.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cloud-compute/5-define-cloud-models"},
{id:"m10",t:"single",d:1,q:"Azure Reserved Instances involve committing to 1 or 3 years of VM usage. Is this more like CapEx or OpEx?",o:["Pure CapEx","CapEx-like commitment","Pure OpEx","Neither — it's free"],a:1,ex:"Reservations involve an upfront or committed payment, making them CapEx-like even in the cloud.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cost-management-azure/2-describe-factors-affect-costs-azure"},
{id:"m11",t:"single",d:1,q:"A company deploys Azure SQL Database (PaaS). Under shared responsibility, who patches the database engine?",o:["The customer","Microsoft (cloud provider)","A third-party vendor","Both customer and provider jointly"],a:1,ex:"With PaaS, Microsoft manages the OS and database engine patching. Customer manages data and access.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cloud-compute/4-describe-shared-responsibility-model"},
{id:"m12",t:"yesno",d:1,sts:[{tx:"In a hybrid cloud model, data and applications can move between private and public environments.",a:true},{tx:"A multi-cloud environment requires the use of Azure Arc.",a:false},{tx:"Public cloud resources are accessible only to a single organization.",a:false}],ex:"Hybrid allows movement between environments. Arc helps but isn't required. Public cloud is shared infrastructure.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cloud-compute/5-define-cloud-models"},
{id:"m13",t:"single",d:1,q:"Which dimension of cloud manageability refers to HOW you manage (portal, CLI, APIs)?",o:["Management OF the cloud","Management IN the cloud","Cloud governance","Operational excellence"],a:1,ex:"Management IN the cloud = the tools/interfaces used (portal, CLI, APIs, PowerShell).",src:"https://learn.microsoft.com/en-us/training/modules/describe-benefits-use-cloud-services/5-manageability-cloud"},
{id:"m14",t:"single",d:1,q:"Which lifecycle stage for Azure services provides NO SLA guarantee and is not meant for production?",o:["General Availability (GA)","Public Preview","Private Preview","Long-Term Support"],a:1,ex:"Preview services have no SLA. Private Preview is invitation-only. GA services have full SLAs.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cost-management-azure/2-describe-factors-affect-costs-azure"},

// ─── DOMAIN 2: AZURE ARCHITECTURE & SERVICES (19 questions) ──
{id:"m15",t:"single",d:2,q:"A company needs to automatically create and manage thousands of identical, load-balanced VMs. Which Azure service?",o:["Availability Sets","VM Scale Sets","Azure Functions","Azure Container Instances"],a:1,ex:"VM Scale Sets create and manage identical, load-balanced VMs with auto-scaling rules.",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-compute-networking-services/2-virtual-machines"},
{id:"m16",t:"drop",d:2,q:"Complete the sentences:\n1. Fastest way to run a single container without managing VMs: ____.\n2. Managed container orchestration for large fleets: ____.",blanks:[{opts:["Azure VMs","Azure Container Instances","Azure Kubernetes Service","Azure Functions"],a:1},{opts:["Azure Container Instances","Azure Kubernetes Service","Azure App Service","Azure Batch"],a:1}],ex:"ACI = simplest single container. AKS = orchestration for container fleets at scale.",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-compute-networking-services/5-containers"},
{id:"m17",t:"single",d:2,q:"Which storage redundancy replicates data across 3 AZs in the primary region AND to a secondary region WITH read access?",o:["GRS","ZRS","RA-GRS","RA-GZRS"],a:3,ex:"RA-GZRS = ZRS in primary (3 AZs) + LRS in secondary + read access to secondary.",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-storage-services/3-redundancy"},
{id:"m18",t:"yesno",d:2,sts:[{tx:"Azure DNS can be used to purchase domain names.",a:false},{tx:"Azure DNS supports alias record sets that auto-update when resource IPs change.",a:true},{tx:"VNet peering allows private communication across different Azure regions.",a:true}],ex:"Azure DNS does NOT purchase domains. Alias records auto-update. Global VNet peering works cross-region.",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-compute-networking-services/12-domain-name-system"},
{id:"m19",t:"single",d:2,q:"Which service provides managed domain join, Group Policy, LDAP, and Kerberos WITHOUT deploying domain controllers?",o:["Microsoft Entra ID","Microsoft Entra Domain Services","Azure AD B2C","Azure Key Vault"],a:1,ex:"Entra Domain Services provides managed traditional AD DS services for legacy apps.",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-identity-access-security/2-directory-services"},
{id:"m20",t:"scenario",d:2,sc:"Your organization needs VMs protected against an entire datacenter going offline within a single Azure region.",sols:[{tx:"Deploy VMs across multiple availability zones in the region.",a:true},{tx:"Deploy VMs in a single availability set.",a:false},{tx:"Place VMs in different resource groups within the same region.",a:false}],ex:"Availability zones protect against datacenter failures. Availability sets protect against rack failures. Resource groups are logical only.",src:"https://learn.microsoft.com/en-us/training/modules/describe-core-architectural-components-of-azure/5-describe-azure-physical-infrastructure"},
{id:"m21",t:"correct",d:2,q:"Azure [Blob Storage] provides fully managed file shares accessible via the SMB protocol.",ul:"Blob Storage",o:["No change needed","Azure Files","Azure Queue Storage","Azure Table Storage"],a:1,ex:"Azure Files provides SMB file shares. Blob Storage is for unstructured objects (images, videos).",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-storage-services/4-describe-azure-storage-services"},
{id:"m22",t:"single",d:2,q:"Which Zero Trust principle emphasizes minimizing the blast radius and segmenting access?",o:["Verify explicitly","Use least privilege access","Assume breach","Defense in depth"],a:2,ex:"'Assume breach' means minimize blast radius, segment access, verify end-to-end encryption.",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-identity-access-security/7-describe-zero-trust-model"},
{id:"m23",t:"single",d:2,q:"What is the minimum recommended distance between Azure paired regions?",o:["100 miles","200 miles","300 miles","500 miles"],a:2,ex:"Most region pairs are at least 300 miles apart to reduce impact of regional disasters.",src:"https://learn.microsoft.com/en-us/training/modules/describe-core-architectural-components-of-azure/5-describe-azure-physical-infrastructure"},
{id:"m24",t:"single",d:2,q:"Which service evaluates signals like user location, device state, and risk level to make access decisions?",o:["Microsoft Entra ID","MFA","Conditional Access","Azure Policy"],a:2,ex:"Conditional Access uses signals (user, location, device, risk) to enforce allow/block/MFA policies.",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-identity-access-security/5-conditional-access"},
{id:"m25",t:"single",d:2,q:"Which provides a security posture assessment with a Secure Score and recommendations for Azure, AWS, and GCP?",o:["Microsoft Sentinel","Microsoft Defender for Cloud","Azure Monitor","Azure Advisor"],a:1,ex:"Defender for Cloud provides CSPM with Secure Score across Azure, AWS, and GCP (multi-cloud).",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-identity-access-security/9-describe-microsoft-defender-for-cloud"},
{id:"m26",t:"single",d:2,q:"An application running in Azure needs to securely store API keys and encryption certificates. Which service?",o:["Azure Monitor","Azure Key Vault","Microsoft Purview","Azure Policy"],a:1,ex:"Azure Key Vault securely stores keys, secrets, and certificates with centralized access control.",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-identity-access-security/9-describe-microsoft-defender-for-cloud"},
{id:"m27",t:"single",d:2,q:"NSGs (Network Security Groups) operate at which layers to filter network traffic?",o:["Layer 7 only (application)","Layer 3-4 (network/transport)","Layer 1-2 (physical/data link)","All layers (1-7)"],a:1,ex:"NSGs filter traffic at Layer 3-4 using IP addresses, ports, and protocols. No Layer 7 inspection.",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-compute-networking-services/8-virtual-network"},
{id:"m28",t:"dd",d:2,q:"Match each migration/transfer tool to its best use case.",items:["Scriptable one-directional data copy","Bidirectional file sync with cloud tiering","Large offline data transfer (80 TB)"],targets:["AzCopy","Azure File Sync","Azure Data Box"],correct:[0,1,2],ex:"AzCopy = scriptable CLI. File Sync = bidirectional. Data Box = massive offline transfers.",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-storage-services/7-identify-azure-file-movement-options"},
{id:"m29",t:"single",d:2,q:"Which connects on-premises networks to Azure over an encrypted tunnel through the PUBLIC internet?",o:["Azure ExpressRoute","Azure VPN Gateway","VNet Peering","Azure Bastion"],a:1,ex:"VPN Gateway creates encrypted tunnels over the internet. ExpressRoute uses a private connection.",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-compute-networking-services/10-virtual-private-networks"},
{id:"m30",t:"single",d:2,q:"Which Entra ID feature lets external partners access your organization's apps using their own credentials?",o:["Conditional Access","External Identities (B2B)","Entra Domain Services","Managed Identities"],a:1,ex:"External Identities B2B lets partners sign in with their own identity provider to access your resources.",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-identity-access-security/4-external-identities"},
{id:"m31",t:"multi",d:2,q:"Which TWO are required components when creating an Azure Virtual Network? (Select two)",o:["A unique address space (CIDR range)","An associated storage account","At least one subnet","A VPN gateway connection"],a:[0,2],ex:"VNets require an address space and at least one subnet. VPN gateways and storage accounts are optional.",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-compute-networking-services/8-virtual-network"},
{id:"m32",t:"single",d:2,q:"Which storage redundancy option replicates data to a secondary paired region but does NOT provide read access until failover?",o:["LRS","ZRS","GRS","RA-GRS"],a:2,ex:"GRS replicates to a secondary region but read access only available after Microsoft-initiated failover. RA-GRS adds read access.",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-storage-services/3-redundancy"},
{id:"m33",t:"single",d:2,q:"At which layer of defense in depth does DDoS protection operate in Microsoft's model?",o:["Identity & Access","Perimeter","Network","Application"],a:1,ex:"DDoS protection operates at the Perimeter layer—not the Network layer (a common exam trap).",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-identity-access-security/8-describe-defense-depth"},

// ─── DOMAIN 3: MANAGEMENT & GOVERNANCE (17 questions) ─────────
{id:"m34",t:"dd",d:3,q:"Match each calculator to its purpose.",items:["Estimate costs for specific new Azure resources","Compare total cost of on-premises vs Azure migration"],targets:["Pricing Calculator","TCO Calculator"],correct:[0,1],ex:"Pricing = estimate new Azure costs. TCO = compare on-prem vs Azure savings over 1-5 years.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cost-management-azure/3-compare-pricing-total-cost-of-ownership-calculators"},
{id:"m35",t:"single",d:3,q:"Which reduces VM costs by up to 72% with a 1- or 3-year commitment?",o:["Spot instances","Azure Reserved Instances","Pay-as-you-go pricing","Azure Hybrid Benefit"],a:1,ex:"Reserved Instances offer up to 72% savings over pay-as-you-go with 1 or 3-year terms.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cost-management-azure/2-describe-factors-affect-costs-azure"},
{id:"m36",t:"correct",d:3,q:"Azure [Advisor] collects, analyzes, and acts on telemetry from Azure and multi-cloud resources.",ul:"Advisor",o:["No change needed","Monitor","Service Health","Defender for Cloud"],a:1,ex:"Azure Monitor collects telemetry. Advisor provides recommendations. Service Health shows platform status.",src:"https://learn.microsoft.com/en-us/training/modules/describe-monitoring-tools-azure/4-describe-azure-monitor"},
{id:"m37",t:"single",d:3,q:"At what credit usage thresholds do Azure Enterprise Agreement alerts trigger in Cost Management?",o:["50% and 75%","75% and 100%","80% and 100%","90% and 100%"],a:3,ex:"EA credit alerts trigger automatically at 90% and 100% of the Azure Prepayment amount.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cost-management-azure/6-describe-azure-tool"},
{id:"m38",t:"scenario",d:3,sc:"Your company wants to ensure all new VMs are deployed with a mandatory cost-tracking tag. If the tag is missing, it should be added automatically.",sols:[{tx:"Configure Azure RBAC to require tags on all VM deployments.",a:false},{tx:"Create an Azure Policy with a DeployIfNotExists effect for auto-remediation.",a:true},{tx:"Apply resource locks to all VMs to enforce tagging.",a:false}],ex:"Azure Policy can enforce tags and auto-remediate with DeployIfNotExists. RBAC controls user actions, not resource properties. Locks prevent deletion.",src:"https://learn.microsoft.com/en-us/training/modules/describe-features-tools-azure-for-governance-compliance/3-describe-purpose-azure-policy"},
{id:"m39",t:"single",d:3,q:"Which Bicep language compiles down to for Azure deployments?",o:["YAML templates","XML configuration","ARM template JSON","PowerShell scripts"],a:2,ex:"Bicep is a DSL that transpiles to ARM template JSON, supporting all Azure resource types on day zero.",src:"https://learn.microsoft.com/en-us/training/modules/describe-features-tools-manage-deploy-azure-resources/4-describe-azure-resource-manager-azure-arm-templates"},
{id:"m40",t:"single",d:3,q:"Which Azure Advisor recommendation category integrates with Microsoft Defender for Cloud?",o:["Reliability","Security","Performance","Cost"],a:1,ex:"Advisor's Security category pulls its recommendations from Defender for Cloud.",src:"https://learn.microsoft.com/en-us/training/modules/describe-monitoring-tools-azure/2-describe-purpose-of-azure-advisor"},
{id:"m41",t:"yesno",d:3,sts:[{tx:"Azure Policy can prevent noncompliant resources from being created.",a:true},{tx:"Azure Policy evaluates resource compliance during a standard 24-hour cycle.",a:true},{tx:"An Azure Policy initiative can contain a maximum of 10 policy definitions.",a:false}],ex:"Policy can deny creation. Evaluations occur every 24h + on changes. Initiatives can contain 100+ definitions.",src:"https://learn.microsoft.com/en-us/training/modules/describe-features-tools-azure-for-governance-compliance/3-describe-purpose-azure-policy"},
{id:"m42",t:"single",d:3,q:"Which RBAC built-in role has full access to all resources but CANNOT assign roles to others?",o:["Owner","Contributor","Reader","User Access Administrator"],a:1,ex:"Contributor can manage all resources but cannot grant access. Owner can do everything including role assignment.",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-identity-access-security/6-role-based-access-control"},
{id:"m43",t:"single",d:3,q:"A web app has a 99.95% SLA and uses a database with 99.99% SLA. What is the composite SLA?",o:["99.99%","99.95%","99.94%","99.90%"],a:2,ex:"Composite SLA for serial dependencies = 99.95% × 99.99% = 99.94%.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cost-management-azure/2-describe-factors-affect-costs-azure"},
{id:"m44",t:"single",d:3,q:"Which is the LOWEST-COST Azure support plan that provides 24/7 phone and email technical support?",o:["Basic","Developer","Standard","Professional Direct"],a:2,ex:"Standard ($100/mo) is the first plan with 24/7 phone support and <1hr Sev A response.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cost-management-azure/2-describe-factors-affect-costs-azure"},
{id:"m45",t:"single",d:3,q:"Which Infrastructure as Code tool supports multi-cloud deployments (Azure, AWS, GCP)?",o:["ARM templates","Bicep","Terraform","Azure PowerShell"],a:2,ex:"Terraform (HashiCorp) is multi-cloud. ARM templates and Bicep are Azure-only.",src:"https://learn.microsoft.com/en-us/training/modules/describe-features-tools-manage-deploy-azure-resources/4-describe-azure-resource-manager-azure-arm-templates"},
{id:"m46",t:"single",d:3,q:"In Azure, subscriptions serve as both a billing boundary and a(n):",o:["Identity boundary","Access control boundary","Physical boundary","Compliance boundary"],a:1,ex:"Subscriptions are both billing boundaries and access control boundaries for organizing Azure resources.",src:"https://learn.microsoft.com/en-us/training/modules/describe-core-architectural-components-of-azure/6-describe-azure-management-infrastructure"},
{id:"m47",t:"drop",d:3,q:"Complete the sentences:\n1. ____ provides audit reports and compliance documents FROM Microsoft.\n2. ____ provides unified data governance for YOUR organization's data estate.",blanks:[{opts:["Microsoft Purview","Service Trust Portal","Azure Policy","Compliance Manager"],a:1},{opts:["Service Trust Portal","Microsoft Purview","Azure Advisor","Defender for Cloud"],a:1}],ex:"Service Trust Portal = Microsoft's own compliance docs (SOC, ISO). Purview = YOUR data governance.",src:"https://learn.microsoft.com/en-us/training/modules/describe-features-tools-azure-for-governance-compliance/2-describe-purpose-microsoft-purview"},
{id:"m48",t:"single",d:3,q:"You want to build a 3-year savings projection for migrating your on-premises datacenter. Which tool?",o:["Pricing Calculator","Cost Management","TCO Calculator","Azure Advisor"],a:2,ex:"TCO Calculator projects multi-year savings comparing on-premises costs vs Azure.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cost-management-azure/3-compare-pricing-total-cost-of-ownership-calculators"},
{id:"m49",t:"single",d:3,q:"An Azure Policy effect that logs noncompliant resources but does NOT block their creation is called:",o:["Deny","Audit","Append","DeployIfNotExists"],a:1,ex:"Audit logs noncompliance without blocking. Deny blocks creation. DeployIfNotExists auto-remediates.",src:"https://learn.microsoft.com/en-us/training/modules/describe-features-tools-azure-for-governance-compliance/3-describe-purpose-azure-policy"},
{id:"m50",t:"single",d:3,q:"Application Insights is a feature within which broader Azure service?",o:["Azure Advisor","Azure Monitor","Azure Service Health","Microsoft Defender for Cloud"],a:1,ex:"Application Insights is an APM feature within Azure Monitor for app performance monitoring.",src:"https://learn.microsoft.com/en-us/training/modules/describe-monitoring-tools-azure/4-describe-azure-monitor"},
],
hard: [
// ─── DOMAIN 1: CLOUD CONCEPTS (14 questions) ──────────────
{id:"h1",t:"yesno",d:1,sts:[{tx:"Elasticity refers to the ability to AUTOMATICALLY adjust resources based on real-time demand.",a:true},{tx:"Agility refers to the ability to AUTOMATICALLY adjust resources based on real-time demand.",a:false},{tx:"Scalability always implies automatic resource adjustment.",a:false}],ex:"Elasticity = automatic adjustment. Agility = speed of deployment. Scalability = ability to scale (manual or auto).",src:"https://learn.microsoft.com/en-us/training/modules/describe-benefits-use-cloud-services/2-high-availability-scalability-cloud"},
{id:"h2",t:"single",d:1,q:"A company runs Azure VMs (IaaS). Under shared responsibility, which task is the CUSTOMER responsible for?",o:["Securing the physical datacenter","Patching the guest operating system","Managing the physical network hardware","Cooling the server racks"],a:1,ex:"With IaaS, the customer manages OS patching, applications, and data. Provider handles physical infra.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cloud-compute/4-describe-shared-responsibility-model"},
{id:"h3",t:"single",d:1,q:"Which shared responsibility item shifts from 'customer' to 'shared' as you move from IaaS to PaaS?",o:["Physical datacenter security","Data stored in the cloud","Network controls","Devices used by end users"],a:2,ex:"Network controls are the customer's job in IaaS but become shared in PaaS (provider manages VNet infra).",src:"https://learn.microsoft.com/en-us/training/modules/describe-cloud-compute/4-describe-shared-responsibility-model"},
{id:"h4",t:"scenario",d:1,sc:"A startup needs built-in auto-scaling, high availability, and custom domain support for a Node.js web app. They do NOT want to manage any servers or virtual machines.",sols:[{tx:"Deploy Azure VMs with a load balancer and install Node.js.",a:false},{tx:"Use Azure App Service configured with Node.js runtime.",a:true},{tx:"Subscribe to a SaaS website builder tool.",a:false}],ex:"App Service (PaaS) provides auto-scaling, HA, custom domains, and Node.js support—no server management. VMs require managing OS. SaaS doesn't allow custom code.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cloud-service-types/3-describe-platform-service"},
{id:"h5",t:"single",d:1,q:"An organization's electricity bill for its on-premises datacenter is an example of:",o:["Capital Expenditure (CapEx)","Operational Expenditure (OpEx)","Consumption-based cost","One-time depreciation"],a:1,ex:"Electricity is an ongoing operational cost (OpEx), not a capital asset—a commonly tested trap.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cloud-compute/6-describe-consumption-based-model"},
{id:"h6",t:"multi",d:1,q:"Which THREE are ALWAYS the customer's responsibility regardless of cloud service model? (Select three)",o:["Information and data","Physical datacenter security","Accounts and identities","Devices (client endpoints)","Operating system patches"],a:[0,2,3],ex:"Data, accounts/identities, and devices are ALWAYS the customer's job—in IaaS, PaaS, AND SaaS.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cloud-compute/4-describe-shared-responsibility-model"},
{id:"h7",t:"single",d:1,q:"Which benefit of cloud computing provides confidence that both performance and cost outcomes will be consistent?",o:["High availability","Reliability","Predictability","Elasticity"],a:2,ex:"Predictability has two dimensions: performance predictability (autoscaling) and cost predictability (TCO tools).",src:"https://learn.microsoft.com/en-us/training/modules/describe-benefits-use-cloud-services/3-reliability-predictability-cloud"},
{id:"h8",t:"single",d:1,q:"Azure Kubernetes Service (AKS) is classified as which cloud service model?",o:["IaaS","PaaS","SaaS","Serverless"],a:1,ex:"AKS is PaaS—Microsoft manages the Kubernetes control plane infrastructure. You manage workloads.",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-compute-networking-services/5-containers"},
{id:"h9",t:"yesno",d:1,sts:[{tx:"A hybrid cloud environment involves ONLY CapEx spending.",a:false},{tx:"A hybrid cloud environment can involve BOTH CapEx and OpEx.",a:true},{tx:"Public cloud eliminates all CapEx spending.",a:true}],ex:"Hybrid uses both on-prem (CapEx) and cloud (OpEx). Public cloud = OpEx only.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cloud-compute/5-define-cloud-models"},
{id:"h10",t:"single",d:1,q:"Which cloud model places the MOST responsibility on the customer according to the shared responsibility model?",o:["SaaS","PaaS","IaaS","Serverless"],a:2,ex:"IaaS = most customer responsibility (OS, apps, data). SaaS = least.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cloud-compute/4-describe-shared-responsibility-model"},
{id:"h11",t:"drop",d:1,q:"Complete:\n1. 'Deploy new cloud resources in minutes' describes ____.\n2. 'Resources scale automatically based on demand' describes ____.\n3. 'System recovers from failures without downtime' describes ____.",blanks:[{opts:["agility","elasticity","reliability","scalability"],a:0},{opts:["agility","elasticity","reliability","scalability"],a:1},{opts:["agility","elasticity","reliability","scalability"],a:2}],ex:"Agility = deployment speed. Elasticity = automatic scaling. Reliability = failure recovery.",src:"https://learn.microsoft.com/en-us/training/modules/describe-benefits-use-cloud-services/2-high-availability-scalability-cloud"},
{id:"h12",t:"single",d:1,q:"Which is NOT a real cloud pricing term used by Microsoft?",o:["Capital Expenditure (CapEx)","Operational Expenditure (OpEx)","Consumption-based model","Elastic expenditure model"],a:3,ex:"'Elastic expenditure model' is a fabricated term—one of the most reported exam distractors.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cloud-compute/6-describe-consumption-based-model"},
{id:"h13",t:"single",d:1,q:"Management OF the cloud refers to:",o:["The tools you use to manage (portal, CLI)","What you can manage (auto-scaling, deployments, monitoring)","Cloud governance policies","Cost optimization strategies"],a:1,ex:"Management OF = what you manage (scaling, deployments, health). Management IN = how you manage (tools).",src:"https://learn.microsoft.com/en-us/training/modules/describe-benefits-use-cloud-services/5-manageability-cloud"},
{id:"h14",t:"correct",d:1,q:"[IaaS] provides the customer with the LEAST amount of responsibility for infrastructure management.",ul:"IaaS",o:["No change needed","PaaS","SaaS","Hybrid"],a:2,ex:"SaaS provides the least responsibility—customer only manages data and identities. IaaS has the MOST.",src:"https://learn.microsoft.com/en-us/training/modules/describe-cloud-service-types/4-describe-software-service"},

// ─── DOMAIN 2: AZURE ARCHITECTURE & SERVICES (19 questions) ──
{id:"h15",t:"yesno",d:2,sts:[{tx:"Even with Azure ExpressRoute, DNS queries still travel over the public internet.",a:true},{tx:"You can deploy multiple VPN gateways in a single VNet.",a:false},{tx:"VNet peering traffic between Azure regions stays on the Microsoft backbone network.",a:true}],ex:"DNS goes over internet even with ExpressRoute. ONE VPN gateway per VNet. Peered traffic uses Microsoft backbone.",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-compute-networking-services/11-expressroute"},
{id:"h16",t:"single",d:2,q:"A legacy application requires LDAP authentication and domain join but cannot support modern OAuth. Which service?",o:["Microsoft Entra ID","Microsoft Entra Domain Services","Azure AD B2C","Conditional Access"],a:1,ex:"Entra Domain Services provides LDAP, Kerberos, NTLM, and domain join for legacy applications.",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-identity-access-security/2-directory-services"},
{id:"h17",t:"dd",d:2,q:"Match each storage redundancy to its approximate durability (nines).",items:["LRS","ZRS","Any geo-redundant option (GRS/RA-GRS/GZRS/RA-GZRS)"],targets:["11 nines (99.999999999%)","12 nines (99.9999999999%)","16 nines (99.99999999999999%)"],correct:[0,1,2],ex:"LRS = 11 nines. ZRS = 12 nines. Geo-redundant = 16 nines.",src:"https://learn.microsoft.com/en-us/training/modules/describe-azure-storage-services/3-redundancy"},

const EXAM_CFG = {
  easy:   { label:"Easy",   qs:35, time:55*60, desc:"Definitions & recall — clear answer choices, vocabulary-focused", clr:"#16a34a", icon:"📗" },
  medium: { label:"Medium", qs:42, time:50*60, desc:"Scenario-based with traps — similar-sounding options, applied knowledge", clr:"#d97706", icon:"📙" },
  hard:   { label:"Hard",   qs:48, time:45*60, desc:"Realistic exam simulation — nuanced comparisons, time pressure, all formats", clr:"#dc2626", icon:"📕" }
};
const DOMAIN_NAMES = { 1:"Cloud Concepts", 2:"Azure Architecture & Services", 3:"Management & Governance" };
const DOMAIN_WEIGHTS = { 1:0.275, 2:0.375, 3:0.35 };

function shuffleArray(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function buildExam(difficulty) {
  const cfg = EXAM_CFG[difficulty];
  const pool = [...QUESTIONS[difficulty]];
  const n = Math.min(cfg.qs, pool.length);
  const d1 = Math.round(n * DOMAIN_WEIGHTS[1]);
  const d2 = Math.round(n * DOMAIN_WEIGHTS[2]);
  const d3 = n - d1 - d2;
  const pick = (domain, count) => {
    const dp = shuffleArray(pool.filter(q => q.d === domain));
    return dp.slice(0, Math.min(count, dp.length));
  };
  const selected = [...pick(1,d1), ...pick(2,d2), ...pick(3,d3)];
  const flat = [];
  shuffleArray(selected).forEach(q => {
    if (q.t === "scenario") {
      q.sols.forEach((sol, si) => flat.push({...q, _si:si, _st:q.sols.length, _fid:`${q.id}-s${si}`}));
    } else {
      flat.push({...q, _fid:q.id});
    }
  });
  return flat;
}

function calcScore(questions, answers) {
  let earned=0, total=0;
  const details = questions.map((q, i) => {
    const ans = answers[i];
    let correct=false, pts=0, mx=1;
    switch(q.t) {
      case "single": mx=1; correct=ans===q.a; pts=correct?1:0; break;
      case "multi": mx=1; const s=ans||[]; correct=JSON.stringify([...s].sort())===JSON.stringify([...q.a].sort()); pts=correct?1:0; break;
      case "yesno": mx=q.sts.length; const ya=ans||[]; pts=q.sts.reduce((sum,st,j)=>sum+(ya[j]===st.a?1:0),0); correct=pts===mx; break;
      case "scenario": mx=1; const sq=q.sols[q._si]; correct=ans===sq.a; pts=correct?1:0; break;
      case "dd": mx=q.items.length; const da=ans||[]; pts=q.items.reduce((sum,_,j)=>sum+(da[j]===q.correct[j]?1:0),0); correct=pts===mx; break;
      case "drop": mx=q.blanks.length; const ba=ans||[]; pts=q.blanks.reduce((sum,b,j)=>sum+(ba[j]===b.a?1:0),0); correct=pts===mx; break;
      case "correct": mx=1; correct=ans===q.a; pts=correct?1:0; break;
    }
    earned+=pts; total+=mx;
    return {q, ans, correct, pts, mx};
  });
  return { earned, total, scaled: total>0?Math.round(earned/total*1000):0, details };
}

const {useState, useEffect, useRef, useCallback, useMemo} = React;

function Timer({sec}) {
  const m=Math.floor(sec/60), s=sec%60, urgent=sec<120;
  return <div className={urgent?"timer-pulse":""} style={{fontFamily:"'JetBrains Mono',monospace",fontSize:20,fontWeight:700,color:urgent?"#dc2626":"#1e3a5f",background:urgent?"#fef2f2":"#eef4ff",padding:"8px 18px",borderRadius:10,border:`2px solid ${urgent?"#fca5a5":"#93b4e0"}`,display:"inline-flex",alignItems:"center",gap:8}}>
    <span style={{fontSize:16}}>⏱</span> {String(m).padStart(2,"0")}:{String(s).padStart(2,"0")}
  </div>;
}

function TypeBadge({type}) {
  const map = {single:{l:"Multiple Choice",c:"#2563eb"},multi:{l:"Multi-Select",c:"#7c3aed"},yesno:{l:"Yes / No Hotspot",c:"#7c3aed"},scenario:{l:"Scenario Series",c:"#0891b2"},dd:{l:"Drag & Drop",c:"#059669"},drop:{l:"Dropdown Select",c:"#d97706"},correct:{l:"Correct Statement",c:"#dc2626"}};
  const info = map[type]||{l:type,c:"#6b7280"};
  return <span style={{fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:1.4,color:info.c,background:`${info.c}12`,padding:"5px 12px",borderRadius:20,border:`1.5px solid ${info.c}30`}}>{info.l}</span>;
}

function ChoiceList({opts, ans, set, correctIdx, review, multi, name}) {
  const sel = multi ? (ans||[]) : null;
  return <div style={{display:"flex",flexDirection:"column",gap:8}}>
    {multi && <div style={{fontSize:12,color:"#64748b",fontStyle:"italic",marginBottom:4}}>Select all correct answers</div>}
    {opts.map((o,i) => {
      const isCorrect = multi ? correctIdx.includes(i) : i===correctIdx;
      const isSelected = multi ? sel?.includes(i) : ans===i;
      let bg="#fff", bd="#e2e8f0", txtC="#334155";
      if(review) { if(isCorrect){bg="#f0fdf4";bd="#22c55e";txtC="#166534";} else if(isSelected){bg="#fef2f2";bd="#ef4444";txtC="#991b1b";} }
      else if(isSelected) { bg="#eff6ff";bd="#2563eb";txtC="#1d4ed8"; }
      return <label key={i} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 16px",background:bg,border:`2px solid ${bd}`,borderRadius:12,cursor:review?"default":"pointer",transition:"all .15s",color:txtC}}
        onMouseEnter={e=>{if(!review){e.currentTarget.style.borderColor="#93c5fd";e.currentTarget.style.background="#f8faff";}}}
        onMouseLeave={e=>{if(!review){e.currentTarget.style.borderColor=isSelected?"#2563eb":"#e2e8f0";e.currentTarget.style.background=isSelected?"#eff6ff":"#fff";}}}>
        {multi ? <input type="checkbox" checked={sel?.includes(i)||false} disabled={review} onChange={()=>{if(review)return;set(sel?.includes(i)?sel.filter(x=>x!==i):[...(sel||[]),i]);}} style={{width:18,height:18,marginTop:2,accentColor:"#2563eb"}}/>
        : <input type="radio" name={name} checked={ans===i} disabled={review} onChange={()=>!review&&set(i)} style={{width:18,height:18,marginTop:2,accentColor:"#2563eb"}}/>}
        <span style={{fontSize:14,lineHeight:1.6,fontWeight:isSelected&&!review?600:400}}>{o}</span>
        {review && isCorrect && <span style={{marginLeft:"auto",fontSize:11,fontWeight:700,color:"#16a34a",whiteSpace:"nowrap"}}>✓ Correct</span>}
      </label>;
    })}
  </div>;
}

function YesNoBlock({q, ans, set, review}) {
  const a = ans || q.sts.map(()=>null);
  return <div style={{borderRadius:12,overflow:"hidden",border:"1px solid #e2e8f0"}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 72px 72px",background:"#0f172a",color:"#e2e8f0"}}>
      <div style={{padding:"10px 16px",fontSize:12,fontWeight:700,letterSpacing:0.5}}>STATEMENT</div>
      <div style={{padding:"10px 4px",textAlign:"center",fontSize:12,fontWeight:700}}>YES</div>
      <div style={{padding:"10px 4px",textAlign:"center",fontSize:12,fontWeight:700}}>NO</div>
    </div>
    {q.sts.map((st,i) => {
      let bg = i%2===0?"#f8fafc":"#fff";
      if(review) bg = a[i]===st.a ? "#f0fdf4" : "#fef2f2";
      return <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 72px 72px",borderTop:"1px solid #e2e8f0",background:bg}}>
        <div style={{padding:"12px 16px",fontSize:13,lineHeight:1.6}}>{st.tx}</div>
        {[true,false].map(v => <div key={String(v)} style={{display:"flex",justifyContent:"center",alignItems:"center"}}>
          <input type="radio" name={`${q._fid}-yn-${i}`} checked={a[i]===v} disabled={review} onChange={()=>{const n=[...a];n[i]=v;set(n);}} style={{width:17,height:17,accentColor:"#2563eb"}}/>
        </div>)}
      </div>;
    })}
  </div>;
}

function ScenarioBlock({q, ans, set, review}) {
  const sol = q.sols[q._si];
  return <div>
    <div style={{background:"#f0f4ff",border:"1px solid #bfdbfe",borderRadius:12,padding:16,marginBottom:16,fontSize:13,lineHeight:1.7}}>
      <div style={{fontWeight:800,color:"#1e3a5f",marginBottom:6,fontSize:11,textTransform:"uppercase",letterSpacing:1.2}}>📋 Scenario ({q._si+1} of {q._st})</div>{q.sc}
    </div>
    <div style={{fontWeight:600,fontSize:14,marginBottom:14,color:"#1e293b",lineHeight:1.5}}>{sol.tx}</div>
    <div style={{display:"flex",gap:12}}>
      {[true,false].map(v => {
        let bg="#fff",bd="#e2e8f0";
        if(review){if(v===sol.a){bg="#f0fdf4";bd="#22c55e";}else if(ans===v){bg="#fef2f2";bd="#ef4444";}}
        else if(ans===v){bg="#eff6ff";bd="#2563eb";}
        return <label key={String(v)} style={{flex:1,display:"flex",justifyContent:"center",alignItems:"center",gap:8,padding:"14px",background:bg,border:`2px solid ${bd}`,borderRadius:12,cursor:review?"default":"pointer",fontWeight:600,fontSize:15,transition:"all .15s"}}>
          <input type="radio" name={q._fid} checked={ans===v} disabled={review} onChange={()=>!review&&set(v)} style={{width:18,height:18,accentColor:"#2563eb"}}/>{v?"Yes":"No"}
        </label>;
      })}
    </div>
  </div>;
}

function DDBlock({q, ans, set, review}) {
  const a = ans || q.items.map(()=>null);
  return <div style={{display:"flex",flexDirection:"column",gap:10}}>
    <div style={{fontSize:12,color:"#64748b",fontStyle:"italic"}}>Match each item to its correct category</div>
    {q.items.map((item,i) => {
      let bg="#fff",bd="#e2e8f0";
      if(review){bg=a[i]===q.correct[i]?"#f0fdf4":"#fef2f2";bd=a[i]===q.correct[i]?"#22c55e":"#ef4444";}
      return <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",background:bg,border:`2px solid ${bd}`,borderRadius:12,flexWrap:"wrap"}}>
        <span style={{flex:1,fontSize:13,fontWeight:600,minWidth:140,color:"#1e293b"}}>{item}</span>
        <span style={{color:"#94a3b8",fontSize:18}}>→</span>
        <select value={a[i]??""} disabled={review} onChange={e=>{const n=[...a];n[i]=e.target.value===""?null:parseInt(e.target.value);set(n);}} style={{padding:"8px 12px",borderRadius:8,border:"1.5px solid #cbd5e1",fontSize:13,minWidth:150,background:"#fff"}}>
          <option value="">Select...</option>{q.targets.map((t,j)=><option key={j} value={j}>{t}</option>)}
        </select>
        {review && <span style={{fontSize:12,fontWeight:700,color:"#2563eb"}}>✓ {q.targets[q.correct[i]]}</span>}
      </div>;
    })}
  </div>;
}

function DropBlock({q, ans, set, review}) {
  const a = ans || q.blanks.map(()=>null);
  let bi = -1;
  return <div style={{fontSize:14,lineHeight:2.4}}>
    {q.q.split("\n").map((line,li) => {
      if(/^\d+\./.test(line.trim())) {
        bi++; const idx=bi; const b=q.blanks[idx];
        let bd="#cbd5e1",bg="#fff";
        if(review){bg=a[idx]===b.a?"#f0fdf4":"#fef2f2";bd=a[idx]===b.a?"#22c55e":"#ef4444";}
        return <div key={li} style={{marginBottom:6}}>
          {line.trim().replace(/____.*/, "")}
          <select value={a[idx]??""} disabled={review} onChange={e=>{const n=[...a];n[idx]=e.target.value===""?null:parseInt(e.target.value);set(n);}} style={{padding:"5px 10px",borderRadius:8,border:`2px solid ${bd}`,fontSize:13,background:bg,margin:"0 4px"}}>
            <option value="">Select...</option>{b.opts.map((o,j)=><option key={j} value={j}>{o}</option>)}
          </select>
          {review && <span style={{fontWeight:700,fontSize:12,color:"#2563eb",marginLeft:4}}>✓ {b.opts[b.a]}</span>}
        </div>;
      }
      return <div key={li} style={{fontWeight:600,color:"#1e293b"}}>{line}</div>;
    })}
  </div>;
}

function CorrectBlock({q, ans, set, review}) {
  return <div>
    <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:12,padding:16,marginBottom:16,fontSize:14,lineHeight:1.8}}>
      {q.q.split(`[${q.ul}]`).map((p,i,arr) => <span key={i}>{p}{i<arr.length-1&&<span style={{textDecoration:"underline wavy #2563eb",fontWeight:700,color:"#2563eb",background:"#dbeafe",padding:"2px 8px",borderRadius:6}}>{q.ul}</span>}</span>)}
    </div>
    <div style={{fontSize:12,color:"#64748b",fontStyle:"italic",marginBottom:10}}>If the underlined term is incorrect, select the correct option:</div>
    <ChoiceList opts={q.o} ans={ans} set={set} correctIdx={q.a} review={review} name={q._fid+"-cs"}/>
  </div>;
}

function RenderQuestion({q, ans, set, review}) {
  switch(q.t) {
    case "single": return <ChoiceList opts={q.o} ans={ans} set={set} correctIdx={q.a} review={review} name={q._fid}/>;
    case "multi": return <ChoiceList opts={q.o} ans={ans} set={set} correctIdx={q.a} review={review} multi name={q._fid}/>;
    case "yesno": return <YesNoBlock q={q} ans={ans} set={set} review={review}/>;
    case "scenario": return <ScenarioBlock q={q} ans={ans} set={set} review={review}/>;
    case "dd": return <DDBlock q={q} ans={ans} set={set} review={review}/>;
    case "drop": return <DropBlock q={q} ans={ans} set={set} review={review}/>;
    case "correct": return <CorrectBlock q={q} ans={ans} set={set} review={review}/>;
    default: return null;
  }
}

// ══════════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════════
function App() {
  const [phase, setPhase] = useState("select");
  const [diff, setDiff] = useState(null);
  const [qs, setQs] = useState([]);
  const [ans, setAns] = useState({});
  const [cur, setCur] = useState(0);
  const [time, setTime] = useState(0);
  const [score, setScore] = useState(null);
  const [filter, setFilter] = useState("all");
  const [showNav, setShowNav] = useState(false);
  const timerRef = useRef(null);

  const finish = useCallback(() => {
    clearInterval(timerRef.current);
    setScore(calcScore(qs, ans));
    setPhase("results");
    window.scrollTo(0, 0);
  }, [qs, ans]);

  useEffect(() => {
    if (phase==="exam" && time>0) {
      timerRef.current = setInterval(()=>setTime(t=>{if(t<=1){clearInterval(timerRef.current);return 0;}return t-1;}),1000);
      return ()=>clearInterval(timerRef.current);
    }
    if (phase==="exam" && time<=0 && qs.length>0) finish();
  }, [phase, time]);

  const start = (d) => {
    setDiff(d);
    const exam = buildExam(d);
    setQs(exam); setAns({}); setCur(0); setTime(EXAM_CFG[d].time); setScore(null); setFilter("all"); setShowNav(false);
    setPhase("exam");
  };
  const restart = () => { setPhase("select"); setDiff(null); setQs([]); setAns({}); setCur(0); setScore(null); };

  // ── SELECT SCREEN ──
  if (phase === "select") return (
    <div style={{minHeight:"100vh",background:"#0b1120",display:"flex",justifyContent:"center",alignItems:"center",padding:24}}>
      <div style={{maxWidth:900,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:13,letterSpacing:3,textTransform:"uppercase",color:"#475569",fontWeight:700,marginBottom:16}}>Microsoft Azure Fundamentals</div>
        <h1 style={{fontSize:44,fontWeight:900,color:"#f1f5f9",margin:"0 0 6px",letterSpacing:-.5}}>AZ-900 Exam Simulator</h1>
        <p style={{color:"#64748b",fontSize:14,margin:"0 0 6px"}}>150 practice questions across 3 exclusive difficulty levels</p>
        <p style={{color:"#475569",fontSize:12,margin:"0 0 48px"}}>Passing score: 700/1000 · 7 question types · Microsoft Learn sources</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(250px,1fr))",gap:20,marginBottom:40}}>
          {Object.entries(EXAM_CFG).map(([k,v]) =>
            <button key={k} onClick={()=>start(k)} style={{background:"#131c31",border:`1.5px solid ${v.clr}30`,borderRadius:20,padding:"32px 24px",cursor:"pointer",textAlign:"center",transition:"all .25s",outline:"none"}}
              onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-6px)";e.currentTarget.style.borderColor=v.clr;e.currentTarget.style.boxShadow=`0 12px 40px ${v.clr}20`;}}
              onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.borderColor=v.clr+"30";e.currentTarget.style.boxShadow="";}}>
              <div style={{fontSize:32,marginBottom:12}}>{v.icon}</div>
              <div style={{fontSize:22,fontWeight:800,color:v.clr,marginBottom:10}}>{v.label}</div>
              <div style={{color:"#94a3b8",fontSize:12,marginBottom:20,lineHeight:1.6}}>{v.desc}</div>
              <div style={{display:"flex",justifyContent:"center",gap:24,color:"#64748b",fontSize:12,fontWeight:600}}>
                <span>{v.qs} questions</span><span>{Math.floor(v.time/60)} minutes</span>
              </div>
            </button>
          )}
        </div>
        <div style={{background:"#131c31",borderRadius:14,padding:"14px 20px",border:"1px solid #1e293b"}}>
          <div style={{color:"#64748b",fontSize:11,lineHeight:1.8}}>
            <span style={{color:"#3b82f6",fontWeight:700}}>Question types: </span>
            Multiple Choice · Multi-Select · Yes/No Hotspot · Scenario Series · Drag & Drop · Dropdown Select · Correct the Statement
          </div>
        </div>
      </div>
    </div>
  );

  // ── EXAM SCREEN ──
  if (phase === "exam") {
    const q = qs[cur];
    const cfg = EXAM_CFG[diff];
    const answered = Object.keys(ans).length;
    const pct = ((cur+1)/qs.length*100);

    return (
      <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
        {/* Header */}
        <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontWeight:800,fontSize:14,color:"#0f172a"}}>AZ-900</span>
            <span style={{background:`${cfg.clr}15`,color:cfg.clr,fontWeight:700,fontSize:11,padding:"4px 12px",borderRadius:20,border:`1px solid ${cfg.clr}30`}}>{cfg.label}</span>
          </div>
          <Timer sec={time}/>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <span style={{fontSize:12,color:"#64748b",fontWeight:600}}>Q {cur+1}/{qs.length} · {answered} answered</span>
            <button onClick={()=>setShowNav(!showNav)} style={{background:showNav?"#2563eb":"#f1f5f9",color:showNav?"#fff":"#475569",border:"1px solid #e2e8f0",borderRadius:8,padding:"6px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>☰ Nav</button>
          </div>
        </div>

        {/* Progress bar */}
        <div style={{maxWidth:920,margin:"0 auto",padding:"10px 20px 0"}}>
          <div style={{width:"100%",background:"#e2e8f0",borderRadius:10,height:6,overflow:"hidden"}}>
            <div style={{width:`${pct}%`,background:`linear-gradient(90deg,${cfg.clr},${cfg.clr}cc)`,height:"100%",borderRadius:10,transition:"width .3s"}}/>
          </div>
        </div>

        {/* Nav Grid */}
        {showNav && <div style={{maxWidth:920,margin:"8px auto",padding:"0 20px"}}>
          <div style={{background:"#fff",borderRadius:12,border:"1px solid #e2e8f0",padding:12,display:"flex",flexWrap:"wrap",gap:4,justifyContent:"center"}}>
            {qs.map((_,i)=>{
              const isAnswered=ans[i]!==undefined;const isCur=i===cur;
              return <button key={i} onClick={()=>{setCur(i);setShowNav(false);}} style={{width:30,height:30,borderRadius:6,border:isCur?"2px solid #2563eb":"1px solid #e2e8f0",background:isAnswered?(isCur?"#2563eb":"#dbeafe"):(isCur?"#eff6ff":"#fff"),color:isAnswered&&isCur?"#fff":"#475569",fontSize:10,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{i+1}</button>;
            })}
          </div>
        </div>}

        {/* Question */}
        <div key={cur} className="fade-in" style={{maxWidth:920,margin:"12px auto",padding:"0 20px"}}>
          <div style={{background:"#fff",borderRadius:20,boxShadow:"0 1px 4px rgba(0,0,0,.05)",border:"1px solid #e2e8f0",padding:"28px 32px"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
              <TypeBadge type={q.t}/>
              <span style={{fontSize:10,color:"#94a3b8",fontWeight:700,letterSpacing:0.5}}>DOMAIN {q.d}: {DOMAIN_NAMES[q.d]}</span>
            </div>
            {q.t !== "scenario" && <div style={{fontSize:15,fontWeight:600,color:"#0f172a",marginBottom:20,lineHeight:1.7}}>{q.q||q.s}</div>}
            <RenderQuestion q={q} ans={ans[cur]} set={v=>setAns({...ans,[cur]:v})}/>
          </div>

          {/* Navigation */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 0 40px",gap:12,flexWrap:"wrap"}}>
            <button onClick={()=>setCur(Math.max(0,cur-1))} disabled={cur===0} style={{padding:"10px 24px",borderRadius:12,border:"1.5px solid #cbd5e1",background:"#fff",cursor:cur===0?"default":"pointer",fontSize:13,fontWeight:700,color:cur===0?"#cbd5e1":"#475569",opacity:cur===0?.5:1}}>← Previous</button>
            <div style={{fontSize:11,color:"#94a3b8",fontWeight:600}}>{answered}/{qs.length} answered</div>
            {cur < qs.length-1 ?
              <button onClick={()=>setCur(cur+1)} style={{padding:"10px 24px",borderRadius:12,border:"none",background:"#2563eb",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,boxShadow:"0 2px 8px rgba(37,99,235,.25)"}}>Next →</button>
              : <button onClick={finish} style={{padding:"10px 28px",borderRadius:12,border:"none",background:"#059669",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:800,boxShadow:"0 2px 8px rgba(5,150,105,.3)"}}>✓ Submit Exam</button>
            }
          </div>
        </div>
      </div>
    );
  }

  // ── RESULTS SCREEN ──
  if (phase === "results" && score) {
    const passed = score.scaled >= 700;
    const cfg = EXAM_CFG[diff];
    const wrong = score.details.filter(d=>!d.correct);
    const list = filter==="wrong" ? wrong : score.details;
    const domainStats = {};
    [1,2,3].forEach(d => {
      const items = score.details.filter(x=>x.q.d===d);
      const e = items.reduce((s,x)=>s+x.pts,0);
      const t = items.reduce((s,x)=>s+x.mx,0);
      domainStats[d] = { earned:e, total:t, pct: t>0?Math.round(e/t*100):0 };
    });

    return (
      <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
        {/* Hero */}
        <div style={{background:passed?"linear-gradient(135deg,#065f46,#059669,#34d399)":"linear-gradient(135deg,#991b1b,#dc2626,#f87171)",padding:"56px 24px 48px",textAlign:"center",color:"#fff"}}>
          <div style={{fontSize:80,fontWeight:900,lineHeight:1}}>{score.scaled}</div>
          <div style={{fontSize:14,opacity:.8,marginTop:4}}>out of 1,000</div>
          <div style={{fontSize:32,fontWeight:800,marginTop:12}}>{passed?"🎉 PASSED":"❌ NOT PASSED"}</div>
          <div style={{fontSize:13,opacity:.75,marginTop:8}}>{cfg.label} Level · {score.earned}/{score.total} points earned · Passing: 700</div>
        </div>

        <div style={{maxWidth:920,margin:"0 auto",padding:"24px 20px 64px"}}>
          {/* Domain Breakdown */}
          <div style={{background:"#fff",borderRadius:20,padding:24,marginBottom:20,border:"1px solid #e2e8f0"}}>
            <h3 style={{margin:"0 0 16px",color:"#0f172a",fontSize:16,fontWeight:800}}>Domain Breakdown</h3>
            {[1,2,3].map(d => <div key={d} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                <span style={{fontWeight:700,color:"#475569"}}>D{d}: {DOMAIN_NAMES[d]}</span>
                <span style={{fontWeight:800,color:domainStats[d].pct>=70?"#059669":"#dc2626"}}>{domainStats[d].pct}% ({domainStats[d].earned}/{domainStats[d].total})</span>
              </div>
              <div style={{background:"#f1f5f9",borderRadius:10,height:10,overflow:"hidden"}}>
                <div style={{width:`${domainStats[d].pct}%`,background:domainStats[d].pct>=70?"linear-gradient(90deg,#22c55e,#4ade80)":"linear-gradient(90deg,#ef4444,#f87171)",height:"100%",borderRadius:10,transition:"width .6s"}}/>
              </div>
            </div>)}
          </div>

          {/* Filter + Restart */}
          <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
            <button onClick={()=>setFilter("all")} style={{padding:"8px 16px",borderRadius:10,border:filter==="all"?"2px solid #2563eb":"1.5px solid #e2e8f0",background:filter==="all"?"#eff6ff":"#fff",color:filter==="all"?"#2563eb":"#64748b",fontWeight:700,fontSize:12,cursor:"pointer"}}>All Questions ({score.details.length})</button>
            <button onClick={()=>setFilter("wrong")} style={{padding:"8px 16px",borderRadius:10,border:filter==="wrong"?"2px solid #dc2626":"1.5px solid #e2e8f0",background:filter==="wrong"?"#fef2f2":"#fff",color:filter==="wrong"?"#dc2626":"#64748b",fontWeight:700,fontSize:12,cursor:"pointer"}}>Incorrect Only ({wrong.length})</button>
            <div style={{flex:1}}/>
            <button onClick={restart} style={{padding:"10px 24px",borderRadius:12,border:"none",background:"#2563eb",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,boxShadow:"0 2px 8px rgba(37,99,235,.2)"}}>↻ New Exam</button>
          </div>

          {/* Question Review */}
          {list.map((item, idx) => {
            const q = item.q;
            const globalIdx = score.details.indexOf(item);
            return <div key={idx} className="fade-in" style={{background:"#fff",borderRadius:20,border:`2px solid ${item.correct?"#bbf7d0":"#fecaca"}`,padding:"24px 28px",marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
                <span style={{fontWeight:800,fontSize:12,color:item.correct?"#059669":"#dc2626",background:item.correct?"#f0fdf4":"#fef2f2",padding:"4px 12px",borderRadius:10}}>{item.correct?"✓ Correct":"✗ Incorrect"} ({item.pts}/{item.mx})</span>
                <TypeBadge type={q.t}/>
                <span style={{fontSize:10,color:"#94a3b8",fontWeight:600}}>Q{globalIdx+1} · D{q.d}</span>
              </div>
              {q.t !== "scenario" && <div style={{fontSize:14,fontWeight:600,color:"#0f172a",marginBottom:16,lineHeight:1.6}}>{q.q||q.s}</div>}
              <RenderQuestion q={q} ans={item.ans} review={true} set={()=>{}}/>
              <div style={{marginTop:16,background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:12,padding:16}}>
                <div style={{fontSize:12,fontWeight:800,color:"#0369a1",marginBottom:6,letterSpacing:0.3}}>EXPLANATION</div>
                <div style={{fontSize:13,color:"#334155",lineHeight:1.7}}>{q.ex}</div>
                <a href={q.src} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:10,fontSize:11,color:"#2563eb",fontWeight:700,textDecoration:"none",padding:"6px 12px",background:"#eff6ff",borderRadius:8,border:"1px solid #bfdbfe"}}>📚 View on Microsoft Learn →</a>
              </div>
            </div>;
          })}

          <div style={{textAlign:"center",paddingTop:28}}>
            <button onClick={restart} style={{padding:"16px 48px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"#fff",cursor:"pointer",fontSize:15,fontWeight:800,boxShadow:"0 6px 20px rgba(37,99,235,.3)",transition:"all .2s"}}
              onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"}
              onMouseLeave={e=>e.currentTarget.style.transform=""}>↻ Take Another Exam</button>
          </div>
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
